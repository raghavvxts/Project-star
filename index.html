<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>PROMPOSAL • Vedanshi</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
 *{
  box-sizing:border-box;
  font-family:"Poppins",system-ui,-apple-system,sans-serif;
}

body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  background:
    radial-gradient(circle at top,#020617 0,#020617 45%,transparent 70%),
    radial-gradient(circle at bottom,#111827 0,#020617 60%);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  position:relative;
}

/* Weeknd-style red room overlay for final reveal */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,rgba(127,29,29,0.65),transparent 65%);
  opacity:0;
  pointer-events:none;
  z-index:0;
  mix-blend-mode:soft-light;
  transition:opacity .8s ease-out;
}

body.redroom::before{
  opacity:1;
}

/* Ambient Pink Glow Pulse */
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,
              rgba(236,72,153,0.35),
              transparent 65%);
  opacity:0;
  pointer-events:none;
  z-index:0;
}

@keyframes ambientPulse{
  0%{opacity:0;}
  40%{opacity:.8;}
  100%{opacity:0;}
}

body.glow::after{
  animation:ambientPulse 1.6s ease-out forwards;
}

/* Stars */
.star{
  position:absolute;
  width:2px;
  height:2px;
  background:white;
  opacity:.6;
  animation:twinkle 3s infinite alternate;
}
@keyframes twinkle{
  from{opacity:.4}
  to{opacity:1}
}

/* Shooting Star */
.shooting-star{
  position:absolute;
  width:120px;
  height:2px;
  background:linear-gradient(90deg,white,transparent);
  left:-150px;
  opacity:0;
}
@keyframes shoot{
  0%{transform:translateX(0) translateY(0);opacity:1}
  100%{transform:translateX(120vw) translateY(40vh);opacity:0}
}

/* Background orbs instead of image planets */
.bg-orb{
  position:absolute;
  border-radius:999px;
  filter:blur(30px);
  opacity:0.7;
  pointer-events:none;
  z-index:0;
}

/* Card */
.card{
  background:rgba(9,9,11,0.82);
  backdrop-filter:blur(18px);
  color:#e5e7eb;
  padding:26px 26px 24px;
  border-radius:26px;
  width:min(430px,92vw);
  text-align:center;
  z-index:10;
  position:relative;
  overflow:hidden;
  border:1px solid rgba(148,163,184,0.4);
  box-shadow:
    0 28px 80px rgba(15,23,42,0.9),
    0 0 60px rgba(236,72,153,0.22);
  transition:transform .6s ease, box-shadow .6s ease, border-color .6s ease;
}
.card.zoom{transform:scale(1.08);}

@keyframes subtleShake{
  0%{transform:scale(1.08) translateX(0)}
  25%{transform:scale(1.08) translateX(-2px)}
  50%{transform:scale(1.08) translateX(2px)}
  75%{transform:scale(1.08) translateX(-1px)}
  100%{transform:scale(1.08) translateX(0)}
}
.card.impact{animation:subtleShake .4s ease;}

h1{font-size:26px;margin-bottom:12px}
p{font-size:16px;margin-bottom:22px}

button{
  padding:14px 32px;
  font-size:16px;
  border-radius:999px;
  border:none;
  cursor:pointer;
  margin:8px;
  transition:transform .25s ease, box-shadow .25s ease;
}

.primary{
  background:linear-gradient(135deg,#ec4899,#f472b6);
  color:white;
  box-shadow:0 8px 24px rgba(236,72,153,0.5);
}
.primary:hover{
  transform:translateY(-1px) scale(1.04);
  box-shadow:0 14px 40px rgba(236,72,153,0.65);
}

.secondary{
  background:rgba(15,23,42,0.85);
  color:#e5e7eb;
  border:1px solid rgba(148,163,184,0.6);
}
.secondary:hover{
  transform:translateY(-1px) scale(1.03);
  box-shadow:0 10px 26px rgba(15,23,42,0.9);
  border-color:rgba(148,163,184,0.9);
}

.buttons{
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:12px;
  margin-top:8px;
}
#no{
  transition:.2s ease;
}
.cat{position:absolute;font-size:26px;pointer-events:none}

/* F1-style runaway No button */
.no-run{
  animation:noRun 0.9s ease-out forwards;
}
@keyframes noRun{
  0%{transform:translateX(0) scale(1);opacity:1;filter:blur(0);}
  40%{transform:translateX(60px) scale(1.05);opacity:1;}
  100%{transform:translateX(220px) scale(0.9);opacity:0;filter:blur(2px);}
}

/* Photo */
.star-core{
  width:150px;
  height:150px;
  margin:18px auto 0;
  border-radius:999px;
  background:url("vm1.jpg") center/cover no-repeat;
  box-shadow:
    0 0 0 1px rgba(248,250,252,0.9),
    0 0 55px rgba(236,72,153,0.8);
}

/* Constellation Pink */
.const-wrap{
  position:relative;
  width:100%;
  height:135px;
  margin:10px auto 0;
  overflow:hidden;
}
.const-star{
  position:absolute;
  width:7px;
  height:7px;
  border-radius:50%;
  background:#f472b6;
  box-shadow:0 0 14px rgba(236,72,153,.9);
  animation:pulseStar 2.4s ease-in-out infinite alternate;
}
@keyframes pulseStar{
  from{transform:scale(1);opacity:.8}
  to{transform:scale(1.4);opacity:1}
}
.const-line{
  position:absolute;
  height:2px;
  background:rgba(236,72,153,.85);
  transform-origin:left center;
  box-shadow:0 0 12px rgba(236,72,153,.8);
  opacity:0;
}

/* text pop */
@keyframes textPop{
  0%{transform:scale(.9);opacity:0}
  60%{transform:scale(1.05)}
  100%{transform:scale(1);opacity:1}
}
.final-text{animation:textPop .6s ease forwards;}

/* subtle Spider-Verse webs on corners */
.card.webbed::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at 0 0,rgba(148,163,184,0.22) 0,transparent 55%),
    radial-gradient(circle at 100% 100%,rgba(248,113,113,0.18) 0,transparent 60%);
  pointer-events:none;
}

/* racing line under card when lights go green */
.card.racing::after{
  content:"";
  position:absolute;
  left:-70%;
  right:-70%;
  bottom:14px;
  height:3px;
  border-radius:999px;
  background:linear-gradient(90deg,#22c55e,#a3e635,#fbbf24);
  box-shadow:0 0 18px rgba(34,197,94,.9);
  animation:raceLine .7s ease-out forwards;
}
@keyframes raceLine{
  0%{transform:translateX(0);opacity:1;}
  100%{transform:translateX(60%);opacity:0;}
}

/* tiny fandom tags */
.tags{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:6px;
  margin-top:10px;
}
.tag-pill{
  padding:4px 10px;
  border-radius:999px;
  font-size:11px;
  letter-spacing:0.04em;
  text-transform:uppercase;
  background:rgba(15,23,42,0.9);
  border:1px solid rgba(148,163,184,0.55);
  color:#e5e7eb;
}

/* glitch accent on name */
.glitch-name{
  position:relative;
  animation:glitch 3.5s infinite;
}
@keyframes glitch{
  0%,90%,100%{
    text-shadow:none;
    transform:none;
  }
  92%{
    text-shadow:-2px 0 rgba(56,189,248,0.8),2px 0 rgba(248,113,113,0.8);
    transform:translate(1px,-1px);
  }
  94%{
    text-shadow:2px 0 rgba(56,189,248,0.8),-2px 0 rgba(248,113,113,0.8);
    transform:translate(-1px,1px);
  }
}

/* Yes button spider-web glow */
#yes{
  position:relative;
  overflow:hidden;
}
#yes::after{
  content:"";
  position:absolute;
  inset:-2px;
  border-radius:999px;
  background:
    radial-gradient(circle at 30% 30%,rgba(248,113,113,0.45),transparent 55%),
    radial-gradient(circle at 70% 70%,rgba(248,113,113,0.35),transparent 60%);
  opacity:0;
  mix-blend-mode:screen;
  transition:opacity .18s ease-out;
  pointer-events:none;
}
#yes:hover::after{
  opacity:1;
}

/* F1 lights-out bar */
.lights-wrap{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:18px;
}
.light-dot{
  width:14px;
  height:14px;
  border-radius:999px;
  background:#111827;
  border:1px solid #4b5563;
  box-shadow:0 0 0 1px rgba(15,23,42,0.8);
}
.light-dot.on{
  background:#dc2626;
  box-shadow:0 0 18px rgba(248,113,113,0.9);
}

.light-dot.green{
  background:#22c55e;
  box-shadow:0 0 18px rgba(34,197,94,0.9);
}

/* glitter pink */
.glitter{
  background:linear-gradient(90deg,#f472b6,#ec4899,#f9a8d4,#f472b6);
  background-size:300%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:glitter 3s linear infinite;
}
@keyframes glitter{
  0%{background-position:0%}
  100%{background-position:300%}
}

/* Confetti */
.confetti{
  position:fixed;
  width:8px;
  height:14px;
  top:-20px;
  opacity:.9;
  animation:fall 3s linear forwards;
}
@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
    opacity:0;
  }
}

/* chequered flag wipe overlay */
.flag-wipe{
  position:absolute;
  inset:0;
  background-size:18px 18px;
  background-image:repeating-linear-gradient(45deg,#020617 0,#020617 9px,#f9fafb 9px,#f9fafb 18px);
  transform:translateX(-100%);
  animation:flagWipe .55s ease-out forwards;
  mix-blend-mode:soft-light;
  opacity:0.9;
}
@keyframes flagWipe{
  to{
    transform:translateX(100%);
    opacity:0;
  }
}

/* Weeknd-style stage beams */
.beams{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:0;
  opacity:0;
  transition:opacity 1s ease-out;
}
body.redroom .beams{
  opacity:1;
}
.beam{
  position:absolute;
  width:42%;
  height:140%;
  background:linear-gradient(120deg,rgba(248,250,252,0.08),rgba(248,113,113,0.25),transparent 75%);
  filter:blur(2px);
  mix-blend-mode:screen;
  animation:beamSweep 12s linear infinite;
}
.beam-left{
  left:-14%;
  top:-20%;
  transform:rotate(-18deg);
}
.beam-right{
  right:-14%;
  top:-10%;
  transform:rotate(18deg);
  animation-delay:3s;
}
@keyframes beamSweep{
  0%{transform:translateX(0) rotate(var(--angle,18deg));opacity:0.6;}
  50%{transform:translateX(6%) rotate(var(--angle,18deg));opacity:0.9;}
  100%{transform:translateX(0) rotate(var(--angle,18deg));opacity:0.6;}
}

/* Polaroid strip */
.polaroid-strip{
  margin:10px auto 0;
  display:flex;
  justify-content:center;
  gap:10px;
}
.polaroid{
  background:#f9fafb;
  padding:5px 5px 8px;
  border-radius:6px;
  box-shadow:0 14px 30px rgba(15,23,42,0.8);
}
.polaroid img{
  display:block;
  width:54px;
  height:54px;
  object-fit:cover;
  border-radius:4px;
}
.polaroid:nth-child(1){transform:rotate(-5deg);}
.polaroid:nth-child(2){transform:translateY(-4px);}
.polaroid:nth-child(3){transform:rotate(4deg);}

/* fandom badges grid on final screen */
.badges-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
  margin-top:14px;
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:#9ca3af;
  justify-items:center;
}
.badge-pill{
  padding:4px 10px;
  border-radius:999px;
  border:1px solid rgba(148,163,184,0.7);
  background:rgba(15,23,42,0.9);
}
.badge-pill.center-span{
  grid-column:1 / 3;
}

/* lap indicator */
.lap-indicator{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:8px;
  margin-top:16px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  color:#6b7280;
}
.lap-dots{
  display:flex;
  gap:4px;
}
.lap-dot{
  width:6px;
  height:6px;
  border-radius:999px;
  background:#111827;
  border:1px solid #374151;
}
.lap-dot.active{
  background:#f97316;
  border-color:#fbbf24;
  box-shadow:0 0 8px rgba(251,191,36,0.85);
}

/* tiny signature */
.signature{
  margin-top:6px;
  font-size:10px;
  text-transform:uppercase;
  letter-spacing:0.18em;
  color:#9ca3af;
}

/* Mobile */
@media (max-width:600px){
  .card{width:95vw;padding:26px 16px;border-radius:22px;}
  h1{font-size:20px}
  p{font-size:14px}
  button{width:100%;margin:6px 0;}
  .star-core{width:130px;height:130px;}
  .const-wrap{height:130px;}
  .planet{animation-duration:90s;}
  #no{left:120px;top:60px;}
}
</style>
</head>

<body>

<audio id="music" src="taaron-se.mp3" preload="auto"></audio>
<div class="shooting-star" id="shoot"></div>

<div class="bg-orb" style="width:420px;height:420px;left:8vw;top:20vh;background:radial-gradient(circle,#f472b6,#7c3aed);"></div>
<div class="bg-orb" style="width:520px;height:520px;right:6vw;top:8vh;background:radial-gradient(circle,#38bdf8,#0f172a);"></div>
<div class="bg-orb" style="width:360px;height:360px;left:14vw;bottom:6vh;background:radial-gradient(circle,#22c55e,#0f172a);opacity:0.55;"></div>
<div class="bg-orb" style="width:640px;height:640px;right:4vw;bottom:0;background:radial-gradient(circle,#f97316,#0b1120);opacity:0.45;"></div>

<div class="beams">
  <div class="beam beam-left" style="--angle:-18deg;"></div>
  <div class="beam beam-right" style="--angle:18deg;"></div>
</div>

<div class="card webbed" id="card">
  <h1 style="letter-spacing:0.08em;font-size:22px;margin-bottom:18px;">PROMPOSAL</h1>
  <p style="margin-bottom:6px;">Hey, Vedanshi.</p>
  <p style="margin-top:0;">If there was a multiverse, a grid of starting lights, and a thousand concerts,</p>
  <p style="margin-top:4px;margin-bottom:6px;">I’d still choose you in every timeline, every race, every song.</p>
  <p style="margin-top:4px;">Can I test something with you for a second?</p>
  <div class="tags">
    <span class="tag-pill">🕷️ Spider‑Verse</span>
    <span class="tag-pill">🏁 Lights Out</span>
    <span class="tag-pill">🎵 The Weeknd</span>
  </div>
  <button class="primary" onclick="startLights()">Begin</button>
</div>

<script>
for(let i=0;i<120;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.left=Math.random()*100+'vw';
  s.style.top=Math.random()*100+'vh';
  document.body.appendChild(s);
}

setInterval(()=>{
  const shoot=document.getElementById('shoot');
  shoot.style.top=Math.random()*40+'%';
  shoot.style.animation='none';
  void shoot.offsetWidth;
  shoot.style.animation='shoot 2s linear';
},12000);

const card=document.getElementById('card');

function renderLap(step){
  return `
    <div class="lap-indicator">
      <span>lap</span>
      <div class="lap-dots">
        <span class="lap-dot${step>=1 ? ' active' : ''}"></span>
        <span class="lap-dot${step>=2 ? ' active' : ''}"></span>
        <span class="lap-dot${step>=3 ? ' active' : ''}"></span>
        <span class="lap-dot${step>=4 ? ' active' : ''}"></span>
      </div>
    </div>
  `;
}

function startLights(){
  card.innerHTML=`
    <h1 style="letter-spacing:0.08em;font-size:22px;margin-bottom:10px;">LIGHTS OUT</h1>
    <p style="margin-top:0;margin-bottom:10px;font-size:14px;color:#cbd5f5;">
      Stay with me until the lights go green.
    </p>
    <div class="lights-wrap">
      <div class="light-dot"></div>
      <div class="light-dot"></div>
      <div class="light-dot"></div>
      <div class="light-dot"></div>
      <div class="light-dot"></div>
    </div>
    ${renderLap(1)}
  `;

  const dots=document.querySelectorAll('.light-dot');
  let index=0;
  const interval=setInterval(()=>{
    if(index<dots.length){
      dots[index].classList.add('on');
      index++;
    }else{
      clearInterval(interval);
      dots.forEach(d=>d.classList.remove('on'));
      dots.forEach(d=>d.classList.add('green'));
      card.classList.add('racing');
      setTimeout(()=>card.classList.remove('racing'),900);
      setTimeout(()=>{ ask(); },2300);
    }
  },220);
}

function ask(){
  card.innerHTML=`
    <h1 style="margin-bottom:8px;">Tiny Space Question</h1>
    <p style="margin-top:0;margin-bottom:16px;font-size:14px;color:#cbd5f5;">
      Answer this right and I’ll show you something very, very us.
    </p>
    <p style="margin-top:0;">Across every Spider‑Verse you can imagine, the Sun is still a star… right?</p>
    <div class="buttons">
      <button class="primary" id="yes">Yes</button>
      <button class="secondary" id="no">No</button>
    </div>
    <p style="font-size:12px;color:#6b7280;margin-top:10px;">
      One of these options has serious commitment issues 😼
    </p>
    ${renderLap(2)}
  `;
  const no=document.getElementById('no');

  // Turn NO into a tiny F1 cat-car that runs away when she clicks it
  no.addEventListener('click',()=>{
    if(no.disabled) return;
    no.textContent='😼';
    no.classList.add('no-run');
    no.style.cursor='default';
    no.disabled=true;
    setTimeout(()=>{
      no.style.display='none';
    },900);
  });
  document.getElementById('yes').onclick=confirm;
}

function confirm(){
  card.innerHTML=`
    <h1>Final Confirmation ✨</h1>
    <button class="primary" onclick="finishLine()">Okiee Yawrr</button>
    <button class="secondary" onclick="finishLine()">YUPEEE</button>
    ${renderLap(3)}
  `;
}

function finishLine(){
  const overlay=document.createElement('div');
  overlay.className='flag-wipe';
  card.appendChild(overlay);
  setTimeout(()=>{ overlay.remove(); reveal(); },560);
}

function launchConfetti(){
  const colors=["#f472b6","#ec4899","#f9a8d4","#fb7185","#fca5a5"];
  for(let i=0;i<120;i++){
    const c=document.createElement("div");
    c.className="confetti";
    c.style.left=Math.random()*100+"vw";
    c.style.background=colors[Math.floor(Math.random()*colors.length)];
    c.style.animationDuration=(2+Math.random()*2)+"s";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),4000);
  }
}

function reveal(){
  document.body.classList.add("glow");
  document.body.classList.add("redroom");

  if(navigator.vibrate){ navigator.vibrate(80); }

  card.classList.add("zoom");

  card.innerHTML=`
    <div class="star-core"></div>
    <div style="margin-top:22px">
      <div class="glitter glitch-name" style="font-size:40px;font-family:'Great Vibes',cursive;">Vedanshi</div>
      <div class="final-text" style="font-size:28px;font-weight:800;margin-top:10px;letter-spacing:0.05em;">
        WILL YOU BE MY<br>PROM DATE?
      </div>
      <div class="badges-grid">
        <span class="badge-pill">🕷️ My Spider‑Verse partner</span>
        <span class="badge-pill">🏁 Pole position in my heart</span>
        <span class="badge-pill center-span">🎵 On repeat like The Weeknd</span>
      </div>
    </div>
    <div class="polaroid-strip">
      <div class="polaroid"><img src="vm2.jpg" alt="us"></div>
      <div class="polaroid"><img src="vm3.jpg" alt="us"></div>
      <div class="polaroid"><img src="vm4.jpg" alt="us"></div>
    </div>
    <div class="const-wrap" id="const"></div>
    <div class="signature">crafted by Raghav for Vedanshi</div>
    ${renderLap(4)}
  `;

  setTimeout(()=>{
    card.classList.add("impact");
    setTimeout(()=>card.classList.remove("impact"),400);
  },450);

  setTimeout(()=>{
    const music=document.getElementById('music');
    if(music){
      music.volume=0.67;
      music.play();
    }
    drawConstellation();
  },500);
}

function drawConstellation(){
  const wrap=document.getElementById('const');
  wrap.innerHTML='';
  const letters={
    V:{points:[[0,0],[20,55],[40,0]],lines:[[0,1],[1,2]]},
    E:{points:[[40,0],[0,0],[0,55],[40,55],[0,27],[32,27]],lines:[[0,1],[1,2],[2,3],[2,4],[4,5]]},
    D:{points:[[0,0],[0,55],[30,45],[40,27],[30,10],[0,0]],lines:[[0,1],[1,2],[2,3],[3,4],[4,5]]},
    A:{points:[[0,55],[20,0],[40,55],[10,30],[30,30]],lines:[[0,1],[1,2],[3,4]]},
    N:{points:[[0,55],[0,0],[40,55],[40,0]],lines:[[0,1],[1,2],[2,3]]},
    S:{points:[[40,0],[0,0],[0,27],[40,27],[40,55],[0,55]],lines:[[0,1],[1,2],[2,3],[3,4],[4,5]]},
    H:{points:[[0,0],[0,55],[40,0],[40,55],[0,27],[40,27]],lines:[[0,1],[2,3],[4,5]]},
    I:{points:[[20,0],[20,55]],lines:[[0,1]]}
  };

  const name="VEDANSHI";
  const baseSpacing=55;
  const scale=Math.min(1,(wrap.clientWidth-20)/(name.length*baseSpacing));
  const spacing=baseSpacing*scale;
  const startX=(wrap.clientWidth-(name.length*spacing))/2;
  const baseY=20;

  let offsetX=startX;
  let delay=0;

  for(let char of name){
    const data=letters[char];
    const pts=data.points;

    pts.forEach(p=>{
      const s=document.createElement('div');
      s.className='const-star';
      s.style.left=(offsetX+p[0]*scale)+'px';
      s.style.top=(baseY+p[1]*scale)+'px';
      wrap.appendChild(s);
    });

    data.lines.forEach(pair=>{
      const [i,j]=pair;
      const x1=offsetX+pts[i][0]*scale;
      const y1=baseY+pts[i][1]*scale;
      const x2=offsetX+pts[j][0]*scale;
      const y2=baseY+pts[j][1]*scale;

      const l=document.createElement('div');
      l.className='const-line';
      l.style.left=x1+'px';
      l.style.top=y1+'px';
      const dx=x2-x1;
      const dy=y2-y1;
      l.style.width=Math.hypot(dx,dy)+'px';
      l.style.transform=`rotate(${Math.atan2(dy,dx)}rad)`;
      wrap.appendChild(l);

      setTimeout(()=>{l.style.opacity="1";},delay);
      delay+=180;
    });

    offsetX+=spacing;
  }

  setTimeout(launchConfetti,delay+500);
}
</script>

</body>
</html>
